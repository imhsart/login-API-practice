<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="auth.css">
  <title>SignUp Page</title>
</head>
<body class="signup">
  <h1>SignUp Form</h1>
  <form class="signup-form">
    <label for="name">Full Name:</label>
    <input class="signup-input" type="text" placeholder="Enter full name" id="name">
    <label for="email">Email:</label>
    <input class="signup-input" type="email" placeholder="Enter email" id="email">
    <label for="password">Password:</label>
    <input class='signup-input' type="password" placeholder="Enter password" id="password">
    <button class="signup-btn" type="submit">Sign Up</button>
  </form>
  <p class="existing-user">Already have an account? <a href="pages/login.html">Login</a></p>
  <script src="signup.js"></script>
</body>
</html>
